# =============================================================================
#  ~/.tmux.conf — Ergonomic tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# PREFIX KEY — Change from Ctrl+b to Ctrl+a (easier to reach)
# -----------------------------------------------------------------------------
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix          # Ctrl+a Ctrl+a sends literal Ctrl+a to shell

# -----------------------------------------------------------------------------
# GENERAL SETTINGS
# -----------------------------------------------------------------------------
set -g default-terminal "screen-256color"         # 256 color support
set -ga terminal-overrides ",xterm-256color:Tc"   # True color (24-bit)

set -g history-limit 1000        # Scrollback buffer size
set -g escape-time 0              # No delay for escape key (important for vim)
set -g repeat-time 600            # Time to repeat key without prefix (ms)
set -g focus-events on            # Pass focus events to apps (vim, etc.)
set -g mouse on                   # Enable mouse (scroll, click pane, resize)

set -g base-index 1               # Start windows at 1 (not 0)
setw -g pane-base-index 1         # Start panes at 1 (not 0)
set -g renumber-windows on        # Re-number windows when one is closed

# -----------------------------------------------------------------------------
# KEY BINDINGS — SPLITS
# -----------------------------------------------------------------------------
# Vertical split (side by side) — mapped to \
unbind %
bind \\ split-window -h -c "#{pane_current_path}"   # Ctrl+a \

# Horizontal split (top/bottom) — keep - as well as "
unbind '"'
bind - split-window -v -c "#{pane_current_path}"   # Ctrl+a -

# New windows open in same directory
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# KEY BINDINGS — PANE NAVIGATION (vim-style)
# -----------------------------------------------------------------------------
bind h select-pane -L    # Move left
bind j select-pane -D    # Move down
bind k select-pane -U    # Move up
bind l select-pane -R    # Move right

# Pane resizing (repeatable — hold prefix and keep pressing)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quickly zoom/unzoom a pane
bind z resize-pane -Z    # Ctrl+a z (toggle fullscreen for current pane)

# -----------------------------------------------------------------------------
# KEY BINDINGS — WINDOWS
# -----------------------------------------------------------------------------
bind -r n next-window      # Ctrl+a n — next window (repeatable)
bind -r p previous-window  # Ctrl+a p — previous window (repeatable)
bind Tab last-window       # Ctrl+a Tab — jump to last active window

# -----------------------------------------------------------------------------
# KEY BINDINGS — SESSION
# -----------------------------------------------------------------------------
bind S choose-session      # Ctrl+a S — visual session switcher

# -----------------------------------------------------------------------------
# KEY BINDINGS — MISC
# -----------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"  # Ctrl+a r
bind x kill-pane           # Ctrl+a x — kill pane (no confirmation prompt)
bind q display-panes       # Ctrl+a q — show pane numbers

# Copy mode (vi keys)
setw -g mode-keys vi
bind Enter copy-mode       # Ctrl+a Enter — enter copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -----------------------------------------------------------------------------
# APPEARANCE — COLORS & STATUS BAR
# -----------------------------------------------------------------------------
# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Status bar — position and refresh
set -g status-position bottom
set -g status-interval 5           # Refresh every 5 seconds
set -g status-justify left

# Status bar — colors
set -g status-style "bg=#1a1b26 fg=#a9b1d6"

# Status left — session name
set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] 󰝡 #S #[bg=#1a1b26,fg=#7aa2f7]"

# Status right — date and time
set -g status-right-length 60
set -g status-right "#[fg=#3b4261]#[bg=#3b4261,fg=#a9b1d6] %a %d %b #[bg=#3b4261,fg=#1a1b26]#[bg=#1a1b26,fg=#3b4261]#[bg=#3b4261,fg=#7aa2f7,bold] %H:%M #[default]"

# Window tabs (in status bar)
set -g window-status-format "#[fg=#3b4261] #I #[fg=#565f89]#W "
set -g window-status-current-format "#[bg=#3b4261,fg=#7aa2f7,bold] #I #[fg=#c0caf5]#W #[bg=#1a1b26,fg=#3b4261]"

# Window activity alerts
set -g window-status-activity-style "fg=#e0af68,bold"
setw -g monitor-activity on        # Highlight windows with activity
set -g visual-activity off         # Don't show activity messages in status

# Message / command bar style
set -g message-style "bg=#3b4261 fg=#7aa2f7 bold"
set -g message-command-style "bg=#3b4261 fg=#c0caf5"

# =============================================================================
# HOW TO USE THESE BINDINGS (quick reference)
# =============================================================================
#
#   PREFIX = Ctrl+a
#
#   SESSIONS
#     prefix S         — visual session switcher
#     prefix $         — rename current session
#     prefix d         — detach session
#
#   WINDOWS
#     prefix c         — new window
#     prefix n / p     — next / previous window
#     prefix Tab       — last active window
#     prefix 1-9       — jump to window by number
#     prefix ,         — rename window
#     prefix &         — kill window
#     prefix w         — window list (interactive)
#
#   PANES
#     prefix \         — split vertical (side by side)
#     prefix -         — split horizontal (top/bottom)
#     prefix h/j/k/l   — navigate panes (vim-style)
#     prefix H/J/K/L   — resize pane (repeatable)
#     prefix z         — zoom/unzoom pane
#     prefix q         — show pane numbers
#     prefix x         — kill pane
#     prefix !         — break pane into new window
#
#   COPY MODE
#     prefix Enter     — enter copy mode
#     v                — begin selection
#     y                — copy and exit
#     q                — quit copy mode
#
#   MISC
#     prefix r         — reload this config
#     prefix :         — tmux command prompt
#
# =============================================================================
